services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: relatorio
      POSTGRES_PASSWORD: relatorio123
      POSTGRES_DB: relatorio
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Sem porta no host: o app acessa via rede interna (db:5432).
    # Evita conflito com PostgreSQL local na 5432.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U relatorio -d relatorio"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env.docker
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://relatorio:relatorio123@db:5432/relatorio
      AUTH_SECRET: ${AUTH_SECRET:-change-me-in-production}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      RUN_DB_SETUP: ${RUN_DB_SETUP:-true}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@empresa.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      TECNICO_EMAIL: ${TECNICO_EMAIL:-tecnico@empresa.com}
      TECNICO_PASSWORD: ${TECNICO_PASSWORD:-tecnico123}
    volumes:
      - uploads_data:/app/public/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  uploads_data:
