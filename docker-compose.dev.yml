# Desenvolvimento: só PostgreSQL no Docker, app roda com npm run dev na máquina
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: relatorio
      POSTGRES_PASSWORD: relatorio123
      POSTGRES_DB: relatorio
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U relatorio -d relatorio"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
